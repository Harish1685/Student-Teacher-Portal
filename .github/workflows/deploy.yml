name: Deploy 

on:
  #push:
    #branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest 
    steps:  
      - name: checkout the code
        uses: actions/checkout@v4

      - name: dockerhub login
        run: echo "${{ secrets.DOCKERHUB_PASS }}" | docker login -u {{ secrets.DOCKERHUB_USER }} --password-stdin

      - name: building the pushing images
        run: |
          docker build -t {{ secrets.DOCKERHUB_USER }}/frontend:latest ./frontend
          docker build -t {{ secrets.DOCKERHUB_USER }}/backend:latest ./backend

          docker push {{ secrets.DOCKERHUB_USER }}/frontend:latest
          docker push {{ secrets.DOCKERHUB_USER }}/backend:latest

     # Copy docker-compose.yml to EC2
      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      # Deploy using SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            docker compose pull
            docker compose up -d