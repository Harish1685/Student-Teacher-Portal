name: Deploy 

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest 

    steps:  
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Hub Login
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_PASS }}
        run: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USER" --password-stdin

      - name: Build and Push Images
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
        run: |
          docker build -t $DOCKERHUB_USER/frontend:latest ./frontend
          docker build -t $DOCKERHUB_USER/backend:latest ./backend

          docker push $DOCKERHUB_USER/frontend:latest
          docker push $DOCKERHUB_USER/backend:latest

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app

            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USER }}
          
            docker compose down --remove-orphans

            docker compose pull
            
            docker compose up -d